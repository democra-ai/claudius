<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="-apple-system, BlinkMacSystemFont, 'Geist', 'Inter', sans-serif" role="img" aria-label="Animated demo of the content library matrix showing five share-state glyphs across three profiles.">
  <title>The Grid — content library matrix</title>

  <!-- Light-cream window -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#f5f4ee"/>
    </linearGradient>
    <filter id="windowShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#3d3929" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- macOS-style window with traffic lights -->
  <rect x="20" y="14" width="840" height="452" rx="12" fill="url(#bg)" filter="url(#windowShadow)"/>

  <!-- Title bar with traffic lights (44px) -->
  <g>
    <circle cx="44" cy="36" r="6" fill="#ff5f57"/>
    <circle cx="64" cy="36" r="6" fill="#febc2e"/>
    <circle cx="84" cy="36" r="6" fill="#28c840"/>
    <rect x="110" y="29" width="16" height="14" rx="3" fill="#c96442"/>
    <text x="132" y="40" font-family="Georgia, 'Iowan Old Style', serif" font-size="13" fill="#3d3929" font-style="italic">Claude Multiprofile</text>
  </g>
  <line x1="20" y1="58" x2="860" y2="58" stroke="#e2dccb" stroke-width="1"/>

  <!-- Sidebar -->
  <rect x="20" y="58" width="200" height="408" fill="#fbfaf6" opacity="0.4"/>
  <line x1="220" y1="58" x2="220" y2="466" stroke="#e2dccb" stroke-width="1"/>

  <!-- Sidebar headers + items -->
  <g font-size="9.5" letter-spacing="2" fill="#83786b">
    <text x="36" y="84">CONTENT</text>
  </g>
  <g font-family="-apple-system, sans-serif" font-size="12.5" fill="#3d3929">
    <rect x="32" y="94" width="176" height="32" rx="6" fill="#c96442" fill-opacity="0.12"/>
    <text x="44" y="113">Code sessions</text>
    <text x="44" y="125" font-size="10" fill="#83786b">Cowork chat panel</text>
    <text x="190" y="113" text-anchor="end" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#83786b">2/41</text>

    <text x="44" y="148">Cowork sessions</text>
    <text x="44" y="160" font-size="10" fill="#83786b">Agent mode runs</text>
    <text x="190" y="148" text-anchor="end" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#83786b">0/1</text>

    <text x="44" y="183">Extensions</text>
    <text x="190" y="183" text-anchor="end" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#83786b">3/8</text>

    <text x="44" y="208">MCP servers</text>
    <text x="190" y="208" text-anchor="end" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#83786b">2/4</text>
  </g>

  <line x1="36" y1="232" x2="204" y2="232" stroke="#e2dccb" stroke-width="1"/>

  <g font-size="9.5" letter-spacing="2" fill="#83786b">
    <text x="36" y="252">PROFILES</text>
    <text x="204" y="252" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="10" letter-spacing="0">3/3</text>
  </g>

  <!-- Profile rows -->
  <g font-family="-apple-system, sans-serif" font-size="12">
    <!-- default (live) -->
    <rect x="32" y="262" width="176" height="26" rx="5" fill="#c96442" fill-opacity="0.06"/>
    <g>
      <circle cx="44" cy="275" r="3.2" fill="#c96442">
        <animate attributeName="r" values="3.2;4.6;3.2" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="44" cy="275" r="6.5" fill="#c96442" fill-opacity="0.3">
        <animate attributeName="r" values="3.2;8;3.2" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" values="0.3;0;0.3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="56" y="280" fill="#3d3929" font-weight="500">default</text>
    <rect x="158" y="269" width="38" height="14" rx="7" fill="#c96442" fill-opacity="0.18"/>
    <text x="177" y="279" text-anchor="middle" font-size="8.5" font-weight="600" letter-spacing="1.2" fill="#c96442">LIVE</text>

    <circle cx="44" cy="304" r="2.5" fill="#83786b" fill-opacity="0.5"/>
    <text x="56" y="309" fill="#3d3929">work</text>

    <circle cx="44" cy="332" r="2.5" fill="#83786b" fill-opacity="0.5"/>
    <text x="56" y="337" fill="#3d3929">personal</text>
  </g>

  <!-- ============ Matrix ============ -->
  <!-- Column header row -->
  <g>
    <rect x="220" y="58" width="640" height="34" fill="#f5f4ee" fill-opacity="0.6"/>
    <line x1="220" y1="92" x2="860" y2="92" stroke="#e2dccb" stroke-width="1"/>

    <!-- "filter" pseudo input in item column -->
    <text x="244" y="80" font-size="11" fill="#83786b" font-family="-apple-system, sans-serif">⌕  Filter 41 items</text>
    <line x1="464" y1="58" x2="464" y2="92" stroke="#e2dccb" stroke-width="1"/>

    <!-- column headers -->
    <g font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#3d3929" text-anchor="middle">
      <text x="540" y="78">default</text>
      <text x="615" y="89" font-size="9" font-weight="400" font-family="ui-monospace, Menlo, monospace" fill="#83786b" text-anchor="middle">▪ 2</text>
      <text x="540" y="89" font-size="9" font-weight="400" font-family="ui-monospace, Menlo, monospace" fill="#83786b">11/41</text>
      <text x="690" y="78">work</text>
      <text x="690" y="89" font-size="9" font-weight="400" font-family="ui-monospace, Menlo, monospace" fill="#83786b">8/41</text>
      <text x="840" y="78">personal</text>
      <text x="840" y="89" font-size="9" font-weight="400" font-family="ui-monospace, Menlo, monospace" fill="#83786b">5/41</text>
    </g>
    <line x1="615" y1="58" x2="615" y2="92" stroke="#e2dccb" stroke-width="1"/>
    <line x1="765" y1="58" x2="765" y2="92" stroke="#e2dccb" stroke-width="1"/>
  </g>

  <!-- ============ Section: WORKSPACE ============ -->
  <g>
    <rect x="220" y="92" width="640" height="22" fill="#f5f4ee"/>
    <text x="240" y="107" font-size="9.5" letter-spacing="2" font-weight="500" fill="#3d3929">WORKSPACE</text>
    <text x="840" y="107" text-anchor="end" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#83786b">1 row</text>
    <line x1="220" y1="114" x2="860" y2="114" stroke="#e2dccb" stroke-width="1"/>

    <text x="240" y="135" font-size="12" font-family="-apple-system, sans-serif" fill="#3d3929">Whole workspace</text>
    <text x="240" y="148" font-size="9.5" font-family="-apple-system, sans-serif" fill="#83786b">Toggle to symlink the entire claude-code-sessions/</text>

    <!-- glyph cells -->
    <g font-family="ui-monospace, Menlo, monospace" font-size="20" text-anchor="middle">
      <!-- default: shared (the toggle target) -->
      <text x="540" y="143" fill="#c96442">■</text>
      <!-- work: shared (in same link group) -->
      <text x="690" y="143" fill="#c96442">■</text>
      <!-- personal: absent -->
      <text x="840" y="143" font-size="14" fill="#bfb6a3">·</text>
    </g>
    <line x1="220" y1="160" x2="860" y2="160" stroke="#e2dccb" stroke-width="0.5" stroke-opacity="0.6"/>
  </g>

  <!-- ============ Section: PROJECTS ============ -->
  <g>
    <rect x="220" y="160" width="640" height="22" fill="#f5f4ee"/>
    <text x="240" y="175" font-size="9.5" letter-spacing="2" font-weight="500" fill="#3d3929">PROJECTS</text>
    <text x="840" y="175" text-anchor="end" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#83786b">4 rows</text>
    <line x1="220" y1="182" x2="860" y2="182" stroke="#e2dccb" stroke-width="1"/>
  </g>

  <!-- Row: democra-ai (animation: copied → diverged → copied) -->
  <g>
    <text x="240" y="204" font-size="12" font-family="-apple-system, sans-serif" fill="#3d3929">democra-ai</text>
    <text x="240" y="216" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#83786b">~/democra-ai · 12 sessions · 2h ago</text>
    <g font-family="ui-monospace, Menlo, monospace" font-size="18" text-anchor="middle">
      <text x="540" y="213" fill="#3d3929">●</text>
      <text x="690" y="213" fill="#c96442">
        <animate attributeName="fill" values="#c96442;#d97706;#c96442" dur="3.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.7;1" dur="3.6s" repeatCount="indefinite"/>
      </text>
      <text x="690" y="213" fill="#3d3929">
        <animate attributeName="opacity" values="0;1;0" dur="3.6s" begin="0s" repeatCount="indefinite"/>
      </text>
      <text x="840" y="213" font-size="14" fill="#bfb6a3">·</text>
    </g>
    <line x1="220" y1="228" x2="860" y2="228" stroke="#e2dccb" stroke-width="0.5" stroke-opacity="0.6"/>
  </g>

  <!-- Row: anything (shared across two) -->
  <g>
    <text x="240" y="250" font-size="12" font-family="-apple-system, sans-serif" fill="#3d3929">anything</text>
    <text x="240" y="262" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#83786b">~/anything · 4 sessions · 5d ago</text>
    <g font-family="ui-monospace, Menlo, monospace" font-size="18" text-anchor="middle">
      <text x="540" y="259" fill="#c96442">■</text>
      <text x="690" y="259" font-size="14" fill="#bfb6a3">·</text>
      <text x="840" y="259" fill="#c96442">■</text>
    </g>
    <line x1="220" y1="274" x2="860" y2="274" stroke="#e2dccb" stroke-width="0.5" stroke-opacity="0.6"/>
  </g>

  <!-- Row: position-paper (animated cell: independent → shared) -->
  <g>
    <text x="240" y="296" font-size="12" font-family="-apple-system, sans-serif" fill="#3d3929">position paper</text>
    <text x="240" y="308" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#83786b">~/democra-ai/position paper · 1 session</text>
    <g font-family="ui-monospace, Menlo, monospace" font-size="18" text-anchor="middle">
      <text x="540" y="305" fill="#3d3929">●</text>
      <!-- animated: cycles through absent → independent → shared → absent -->
      <g>
        <text x="690" y="305" font-size="14" fill="#bfb6a3">
          <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.25;0.30;0.65;0.70;1" dur="5s" repeatCount="indefinite"/>
          ·
        </text>
        <text x="690" y="305" fill="#83786b" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.30;0.65;0.70;1" dur="5s" repeatCount="indefinite"/>
          ○
        </text>
        <text x="690" y="305" fill="#c96442" opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;1;0" keyTimes="0;0.25;0.30;0.65;0.70;1" dur="5s" repeatCount="indefinite"/>
          ■
        </text>
      </g>
      <text x="840" y="305" font-size="14" fill="#bfb6a3">·</text>
    </g>
    <line x1="220" y1="320" x2="860" y2="320" stroke="#e2dccb" stroke-width="0.5" stroke-opacity="0.6"/>
  </g>

  <!-- Row: LLM (independent everywhere) -->
  <g>
    <text x="240" y="342" font-size="12" font-family="-apple-system, sans-serif" fill="#3d3929">LLM</text>
    <text x="240" y="354" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#83786b">~/LLM · 22 sessions · 2d ago</text>
    <g font-family="ui-monospace, Menlo, monospace" font-size="16" text-anchor="middle">
      <text x="540" y="351" fill="#83786b">○</text>
      <text x="690" y="351" fill="#83786b">○</text>
      <text x="840" y="351" font-size="14" fill="#bfb6a3">·</text>
    </g>
    <line x1="220" y1="366" x2="860" y2="366" stroke="#e2dccb" stroke-width="0.5" stroke-opacity="0.6"/>
  </g>

  <!-- Pending bar floating -->
  <g>
    <rect x="350" y="408" width="180" height="36" rx="8" fill="#ffffff" stroke="#e2dccb" stroke-width="1" filter="url(#windowShadow)">
      <animate attributeName="y" values="408;404;408" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <text x="372" y="430" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#3d3929">2</text>
    <text x="384" y="430" font-family="-apple-system, sans-serif" font-size="10.5" fill="#83786b">pending</text>
    <text x="438" y="430" font-family="-apple-system, sans-serif" font-size="10.5" fill="#83786b">Cancel</text>
    <rect x="476" y="416" width="46" height="20" rx="5" fill="#c96442"/>
    <text x="499" y="430" font-family="-apple-system, sans-serif" font-size="10.5" font-weight="600" fill="#fbfaf6" text-anchor="middle">Apply</text>
  </g>

  <!-- Legend at bottom -->
  <g font-family="-apple-system, sans-serif" font-size="9.5" fill="#83786b">
    <text x="240" y="396" letter-spacing="1.5">LEGEND</text>
    <g font-family="ui-monospace, Menlo, monospace" font-size="13">
      <text x="296" y="397" fill="#c96442">■</text><text x="306" y="397" font-family="-apple-system,sans-serif" font-size="9.5">shared</text>
      <text x="350" y="397" fill="#3d3929">●</text><text x="360" y="397" font-family="-apple-system,sans-serif" font-size="9.5">copied</text>
      <text x="404" y="397" fill="#d97706">◐</text><text x="414" y="397" font-family="-apple-system,sans-serif" font-size="9.5">diverged</text>
      <text x="462" y="397" fill="#83786b">○</text><text x="472" y="397" font-family="-apple-system,sans-serif" font-size="9.5">independent</text>
      <text x="540" y="397" fill="#bfb6a3" font-size="11">·</text><text x="550" y="397" font-family="-apple-system,sans-serif" font-size="9.5">absent</text>
    </g>
  </g>
</svg>
