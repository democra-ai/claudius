<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Claudius logo: three stacked rounded copper cards, the top card marked with Claude's signature 8-petal sunburst in cream.">
  <title>Claudius</title>
  <defs>
    <!-- Claude-style 8-petal sunburst. Each petal is a simple lens shape;
         all 8 share the same center, forming a solid central hub where
         they overlap — the same visual character as Claude's own mark. -->
    <g id="claude-asterisk">
      <path d="M 0,0 Q 26,-100 0,-200 Q -26,-100 0,0 Z" fill="currentColor"/>
      <path d="M 0,0 Q 26,-100 0,-200 Q -26,-100 0,0 Z" fill="currentColor" transform="rotate(45)"/>
      <path d="M 0,0 Q 26,-100 0,-200 Q -26,-100 0,0 Z" fill="currentColor" transform="rotate(90)"/>
      <path d="M 0,0 Q 26,-100 0,-200 Q -26,-100 0,0 Z" fill="currentColor" transform="rotate(135)"/>
      <path d="M 0,0 Q 26,-100 0,-200 Q -26,-100 0,0 Z" fill="currentColor" transform="rotate(180)"/>
      <path d="M 0,0 Q 26,-100 0,-200 Q -26,-100 0,0 Z" fill="currentColor" transform="rotate(225)"/>
      <path d="M 0,0 Q 26,-100 0,-200 Q -26,-100 0,0 Z" fill="currentColor" transform="rotate(270)"/>
      <path d="M 0,0 Q 26,-100 0,-200 Q -26,-100 0,0 Z" fill="currentColor" transform="rotate(315)"/>
    </g>
  </defs>

  <!-- Back card (faintest) -->
  <rect x="96" y="96" width="720" height="720" rx="180" fill="#c96442" fill-opacity="0.30"/>
  <!-- Middle card -->
  <rect x="152" y="152" width="720" height="720" rx="180" fill="#c96442" fill-opacity="0.62"/>
  <!-- Front card -->
  <rect x="208" y="208" width="720" height="720" rx="180" fill="#c96442"/>

  <!-- Claude sunburst centered on front card, in cream -->
  <g transform="translate(568, 568)" color="#fbfaf6">
    <use href="#claude-asterisk"/>
  </g>
</svg>
