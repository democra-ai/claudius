<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Claudius logo: three stacked rounded copper cards, the top card marked with a serif italic C.">
  <title>Claudius</title>
  <!-- Back card (faintest) -->
  <rect x="96" y="96" width="720" height="720" rx="180" fill="#c96442" fill-opacity="0.30"/>
  <!-- Middle card -->
  <rect x="152" y="152" width="720" height="720" rx="180" fill="#c96442" fill-opacity="0.62"/>
  <!-- Front card -->
  <rect x="208" y="208" width="720" height="720" rx="180" fill="#c96442"/>
  <!-- Serif italic C centered on front card -->
  <text x="568" y="710" font-family="Fraunces, 'Iowan Old Style', Georgia, serif" font-size="540" font-weight="500" font-style="italic" fill="#fbfaf6" text-anchor="middle">C</text>
</svg>
