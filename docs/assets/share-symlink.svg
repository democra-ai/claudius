<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" font-family="-apple-system, BlinkMacSystemFont, 'Geist', sans-serif" role="img" aria-label="Diagram explaining how the Extensions share toggle replaces a folder with a symlink to another profile's folder for live two-way sharing.">
  <title>Symlink share — Model A (live)</title>

  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#c96442"/>
    </marker>
    <marker id="arrow-mute" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#83786b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="320" fill="#fbfaf6"/>

  <text x="40" y="36" font-family="Georgia, 'Iowan Old Style', serif" font-size="20" font-style="italic" fill="#3d3929">How sharing works</text>
  <text x="40" y="56" font-size="12" fill="#83786b">Toggling a cell ON replaces the target's folder with a symlink to the source.
    Edits propagate both ways. Toggling OFF restores an independent copy.</text>

  <!-- Profile A box -->
  <g>
    <rect x="40" y="92" width="280" height="190" rx="10" fill="#ffffff" stroke="#e2dccb" stroke-width="1.5"/>
    <text x="60" y="118" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#3d3929">default</text>
    <text x="60" y="134" font-size="10" fill="#83786b" font-family="ui-monospace, Menlo, monospace">~/Library/Application Support/Claude/</text>

    <!-- Extensions tree -->
    <text x="60" y="162" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#83786b">Extensions/</text>
    <text x="80" y="180" font-size="11.5" font-family="ui-monospace, Menlo, monospace" fill="#3d3929">📁 mcp-helper/</text>
    <text x="80" y="200" font-size="11.5" font-family="ui-monospace, Menlo, monospace" fill="#3d3929">📁 theme-kit/</text>
    <text x="80" y="220" font-size="11.5" font-family="ui-monospace, Menlo, monospace" fill="#3d3929">📁 transcribe/</text>

    <text x="60" y="250" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#83786b">Extensions Settings/</text>
    <text x="80" y="266" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3d3929">📄 theme-kit.json</text>
  </g>

  <!-- Profile B box -->
  <g>
    <rect x="560" y="92" width="280" height="190" rx="10" fill="#ffffff" stroke="#e2dccb" stroke-width="1.5"/>
    <text x="580" y="118" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#3d3929">work</text>
    <text x="580" y="134" font-size="10" fill="#83786b" font-family="ui-monospace, Menlo, monospace">~/Library/Application Support/Claude-WORK/</text>

    <text x="580" y="162" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#83786b">Extensions/</text>

    <!-- mcp-helper: independent copy -->
    <text x="600" y="180" font-size="11.5" font-family="ui-monospace, Menlo, monospace" fill="#3d3929">📁 mcp-helper/</text>

    <!-- theme-kit: symlink to default -->
    <g>
      <text x="600" y="200" font-size="11.5" font-family="ui-monospace, Menlo, monospace" fill="#c96442">🔗 theme-kit  </text>
      <text x="720" y="200" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#83786b">→ default</text>
    </g>

    <!-- transcribe: not present (independent on default only) -->
    <text x="600" y="220" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#bfb6a3">(no transcribe)</text>

    <text x="580" y="250" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#83786b">Extensions Settings/</text>
    <g>
      <text x="600" y="266" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#c96442">🔗 theme-kit.json</text>
    </g>
  </g>

  <!-- Connection lines representing the symlinks -->
  <g>
    <!-- theme-kit folder symlink -->
    <path d="M 240 200 C 360 200, 480 200, 600 200" stroke="#c96442" stroke-width="2" fill="none" stroke-dasharray="0">
      <animate attributeName="stroke-dasharray" values="0 600;6 6;0 600" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- arrow pulses in middle -->
    <circle cx="420" cy="200" r="4" fill="#c96442">
      <animate attributeName="cx" values="240;600;240" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0;1;0" keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- theme-kit.json symlink -->
    <path d="M 240 262 C 360 262, 480 262, 600 262" stroke="#c96442" stroke-width="1.5" fill="none" stroke-dasharray="3 3" opacity="0.7"/>
  </g>

  <!-- Center label -->
  <g>
    <rect x="370" y="100" width="140" height="60" rx="8" fill="#fbfaf6" stroke="#c96442" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="440" y="120" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#c96442">■</text>
    <text x="440" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#3d3929">SHARED</text>
    <text x="440" y="153" text-anchor="middle" font-size="9" fill="#83786b">via symlink</text>
  </g>

  <!-- Bottom annotations -->
  <text x="180" y="310" text-anchor="middle" font-size="10.5" fill="#83786b">edits write through both sides</text>
  <text x="700" y="310" text-anchor="middle" font-size="10.5" fill="#83786b">no extra disk; one source of truth</text>
</svg>
